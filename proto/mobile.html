<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Where to live / Canada — mobile prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="Mobile-layout prototype of the where-to-live-in-Canada ranking tool. Three screens: Answer, Map, List.">
<style>
/* ============================================================
   WHERE TO LIVE / CANADA — MOBILE PROTOTYPE
   Field-guide plate, rebuilt for a 375px phone as three screens.
   Same ink, paper, and teal fit-ramp as the desktop plate.
   System sans stands in for Radio Canada in the prototype.
   ============================================================ */
:root{
  --paper:#F7F7F4; --page:#FFFFFF; --sink:#EFEFEA;
  --ink:#17191D; --ink-2:#585D65; --ink-3:#8B9098;
  --rule:#DEDFDA; --rule-2:#C7C9C2;
  --warm:#DD8525; --cool:#426BC1; --check:#564189;
  --fit-0:#F4F5F2; --fit-1:#E4EDE9; --fit-2:#CBE0D9; --fit-3:#A8CEC3; --fit-4:#7FB8AA; --fit-ink:#0A4F47;
  --tabbar:60px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;}
html,body{margin:0;overflow-x:hidden;}
html{background:var(--sink);}
body{
  background:var(--sink); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:16px; line-height:1.5;
  font-variant-numeric:tabular-nums;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
}
.tnum{font-variant-numeric:tabular-nums;}

/* the phone column. on desktop this centres so the design lead can judge
   the mobile layout; on a real phone it fills the screen. */
.app{
  position:relative;
  max-width:430px; margin:0 auto;
  min-height:100vh; min-height:100dvh;
  background:var(--paper);
  border-left:1px solid var(--rule); border-right:1px solid var(--rule);
  overflow:hidden;
}

/* ---------- top bar ---------- */
.topbar{
  position:sticky; top:0; z-index:30;
  background:var(--paper);
  border-bottom:2px solid var(--ink);
  padding:.55rem 1rem .5rem;
  display:flex; align-items:baseline; justify-content:space-between; gap:.5rem;
}
.topbar h1{
  font-size:1.06rem; font-weight:700; margin:0; letter-spacing:-.01em; line-height:1;
}
.topbar h1 i{font-style:normal; color:var(--ink-3); font-weight:400;}
.topbar .meta{font-size:.72rem; color:var(--ink-3); white-space:nowrap;}

/* ---------- screens ---------- */
.screen{display:none;}
.screen.on{display:block;}
/* leave room for the fixed tab bar */
.pad-bottom{padding-bottom:calc(var(--tabbar) + var(--safe-b) + 1rem);}

/* ================= ANSWER SCREEN ================= */
/* running result, pinned so the survey is always answering something */
.toppick{
  position:sticky; top:0; z-index:20;
  width:100%; text-align:left; cursor:pointer;
  display:grid; grid-template-columns:1fr auto; align-items:center; gap:.75rem;
  padding:.6rem 1rem; min-height:56px;
  background:var(--page); border:0; border-bottom:1px solid var(--rule);
  font:inherit; color:inherit;
}
.toppick .tp-k{font-size:.72rem; color:var(--ink-3); display:block;}
.toppick .tp-name{font-size:1.15rem; font-weight:700; letter-spacing:-.01em; line-height:1.1;}
.toppick .tp-name i{font-style:normal; color:var(--ink-3); font-weight:400; font-size:.8em; margin-left:.25rem;}
.toppick .tp-why{font-size:.76rem; color:var(--ink-2); display:block; margin-top:.1rem;}
.toppick .tp-fit{
  min-width:44px; height:44px; display:flex; align-items:center; justify-content:center;
  font-size:1.15rem; font-weight:700; color:var(--fit-ink); border:1px solid rgba(10,79,71,.18);
}
.toppick .tp-arrow{font-size:.72rem; color:var(--ink-3); margin-top:.15rem; display:block;}

.survey-intro{padding:.85rem 1rem .5rem; border-bottom:1px solid var(--rule);}
.survey-intro p{margin:0; font-size:.82rem; color:var(--ink-2);}

.qgroup{
  position:sticky; top:56px; z-index:10;
  margin:0; padding:.5rem 1rem .45rem;
  font-size:.74rem; font-weight:700; letter-spacing:.01em; color:var(--ink);
  background:var(--sink); border-bottom:1px solid var(--rule);
}
.q{padding:1rem 1rem 1.15rem; border-bottom:1px solid var(--rule); background:var(--paper);}
.q.off{background:var(--paper);}
.q-head{display:flex; align-items:baseline; justify-content:space-between; gap:.6rem;}
.q-label{font-size:1rem; font-weight:600; margin:0;}
.q-say{font-size:.82rem; font-weight:600; color:var(--ink-2); text-align:right; white-space:nowrap;}
.q.off .q-say{color:var(--ink-3); font-weight:400;}
.q-hint{margin:.15rem 0 .7rem; font-size:.78rem; color:var(--ink-3);}

/* answer control dims when the question is set to Skip */
.answer{transition:opacity .18s;}
.q.off .answer{opacity:.4; pointer-events:none;}

/* chips */
.opts{display:flex; flex-wrap:wrap; gap:6px;}
.opt{
  font:inherit; font-size:15px; line-height:1.1;
  min-height:44px; padding:.55rem .8rem; cursor:pointer; border-radius:0;
  border:1px solid var(--rule-2); background:var(--page); color:var(--ink-2);
  display:inline-flex; align-items:center;
}
.opt[aria-pressed="true"]{background:var(--ink); color:var(--paper); border-color:var(--ink);}
.opt:focus-visible{outline:2px solid var(--warm); outline-offset:1px;}

/* slider */
.slider-row{display:flex; align-items:center; gap:.7rem; min-height:44px;}
input[type=range]{
  flex:1; -webkit-appearance:none; appearance:none; background:transparent;
  height:44px; margin:0; cursor:pointer;
}
input[type=range]::-webkit-slider-runnable-track{height:2px; background:var(--rule-2);}
input[type=range]::-moz-range-track{height:2px; background:var(--rule-2);}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none; width:22px; height:34px; margin-top:-16px;
  background:var(--page); border:2px solid var(--ink); border-radius:0;
}
input[type=range]::-moz-range-thumb{width:22px; height:34px; background:var(--page); border:2px solid var(--ink); border-radius:0;}
input[type=range]:focus-visible{outline:2px solid var(--warm); outline-offset:3px;}
.readout{font-size:.9rem; font-weight:700; min-width:5ch; text-align:right;}
.scale-ends{display:flex; justify-content:space-between; font-size:.74rem; color:var(--ink-3); margin-top:.15rem;}

/* the importance control: four big labelled stops, not three 26px squares */
.imp{margin-top:.85rem;}
.imp-lab{font-size:.74rem; color:var(--ink-3); display:block; margin-bottom:.3rem;}
.seg{display:flex; gap:0; border:1px solid var(--rule-2); background:var(--page);}
.seg-b{
  flex:1 1 0; min-width:0; min-height:46px;
  font:inherit; font-size:14px; font-weight:600; color:var(--ink-3);
  background:transparent; border:0; border-left:1px solid var(--rule-2);
  cursor:pointer; padding:.3rem .2rem; white-space:nowrap;
}
.seg-b:first-child{border-left:0;}
.seg-b[aria-pressed="true"]{background:var(--ink); color:var(--paper);}
.seg-b.skip[aria-pressed="true"]{background:var(--sink); color:var(--ink-2);}
.seg-b:focus-visible{outline:2px solid var(--warm); outline-offset:-2px; position:relative; z-index:1;}

.survey-foot{padding:1rem; text-align:left;}
.reset{
  font:inherit; font-size:.82rem; background:none; border:1px solid var(--rule-2);
  color:var(--ink-2); padding:.6rem .9rem; min-height:44px; cursor:pointer; border-radius:0;
}

/* ================= MAP SCREEN ================= */
#screen-map{position:relative;}
.maparea{
  position:relative;
  height:calc(100vh - 42px - var(--tabbar) - var(--safe-b));
  height:calc(100dvh - 42px - var(--tabbar) - var(--safe-b));
  overflow:hidden;
  background:var(--paper);
}
canvas#map{position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none;}
.map-legend{
  position:absolute; top:.6rem; left:.7rem; z-index:2;
  background:rgba(247,247,244,.9); border:1px solid var(--rule);
  padding:.4rem .55rem; font-size:.7rem; color:var(--ink-2);
  display:flex; flex-direction:column; gap:.25rem; pointer-events:none;
}
.map-legend .row{display:flex; align-items:center; gap:.35rem;}
.map-legend i{width:12px; height:12px; display:inline-block; border:1px solid var(--fit-ink);}

/* draggable bottom sheet over the map (Zillow / Airbnb pattern) */
.sheet{
  position:absolute; left:0; right:0; top:0; height:100%;
  background:var(--page); border-top:1px solid var(--rule);
  box-shadow:0 -8px 24px rgba(23,25,29,.09);
  display:flex; flex-direction:column;
  transform:translateY(80%);
  will-change:transform; touch-action:none;
  z-index:3;
}
.sheet.animate{transition:transform .28s cubic-bezier(.22,.61,.36,1);}
.sheet-grip{
  flex:0 0 auto; padding:.5rem 1rem .3rem; cursor:grab; user-select:none;
}
.grip-bar{width:38px; height:5px; border-radius:3px; background:var(--rule-2); margin:.15rem auto .5rem;}
.sheet-head{display:flex; align-items:baseline; justify-content:space-between; gap:.5rem;}
.sheet-head h2{font-size:1rem; font-weight:700; margin:0;}
.sheet-head .n{font-size:.76rem; color:var(--ink-3);}
.sheet-scroll{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain;}

/* ================= LIST SCREEN ================= */
.list-head{padding:.9rem 1rem .7rem; border-bottom:1px solid var(--rule);}
.list-head h2{font-size:1.15rem; font-weight:700; margin:0;}
.list-head p{margin:.2rem 0 0; font-size:.78rem; color:var(--ink-3);}

/* stacked card: rank, name, fit, and only the 3-4 stats that moved the ranking */
.card{
  width:100%; text-align:left; font:inherit; color:inherit; cursor:pointer;
  display:grid; grid-template-columns:2.2rem 1fr; gap:.6rem;
  padding:.85rem 1rem; background:var(--paper);
  border:0; border-bottom:1px solid var(--rule);
}
.card:active{background:var(--sink);}
.card .rank{font-size:1rem; font-weight:700; color:var(--ink-3); padding-top:.15rem; text-align:right;}
.card-main{min-width:0;}
.card-top{display:flex; align-items:center; justify-content:space-between; gap:.6rem;}
.cname{font-size:1.06rem; font-weight:700; letter-spacing:-.01em;}
.cname i{font-style:normal; color:var(--ink-3); font-weight:400; font-size:.78em; margin-left:.25rem;}
.prov-dot{display:inline-block; width:6px; height:6px; margin-left:.35rem; vertical-align:middle; background:var(--check);}
.fit-chip{
  flex:0 0 auto; min-width:40px; height:34px; padding:0 .5rem;
  display:flex; align-items:center; justify-content:center;
  font-size:.98rem; font-weight:700; color:var(--fit-ink);
}
.stats{display:flex; flex-wrap:wrap; gap:.15rem .9rem; margin-top:.45rem;}
.stat{font-size:.8rem; color:var(--ink-2); white-space:nowrap;}
.stat b{font-weight:700; color:var(--ink);}
.stat i{font-style:normal; color:var(--ink-3);}
.card.cut{opacity:.72;}
.card.cut .fit-chip{color:var(--ink-3); background:var(--sink)!important;}
.cut-note{font-size:.8rem; color:var(--warm); margin-top:.45rem;}
.cut-divider{
  padding:.6rem 1rem; font-size:.74rem; color:var(--ink-3);
  background:var(--sink); border-bottom:1px solid var(--rule); border-top:1px solid var(--rule);
}

/* ================= DETAIL SHEET (global) ================= */
.scrim{
  position:fixed; inset:0; z-index:40; background:rgba(23,25,29,.32);
  opacity:0; pointer-events:none; transition:opacity .24s;
}
.scrim.on{opacity:1; pointer-events:auto;}
.detail{
  position:fixed; left:0; right:0; bottom:0; z-index:41;
  max-width:430px; margin:0 auto;
  height:92vh; height:92dvh;
  background:var(--page); border-top:2px solid var(--ink);
  display:flex; flex-direction:column;
  transform:translateY(100%);
  will-change:transform; touch-action:none;
}
.detail.animate{transition:transform .3s cubic-bezier(.22,.61,.36,1);}
.detail-grip{flex:0 0 auto; padding:.5rem 1rem 0; cursor:grab;}
.detail-grip .grip-bar{margin:.1rem auto .4rem;}
.detail-head{
  flex:0 0 auto; display:flex; align-items:flex-start; justify-content:space-between; gap:.6rem;
  padding:.2rem 1rem .7rem; border-bottom:1px solid var(--rule);
}
.detail-head .dh-name{font-size:1.5rem; font-weight:700; letter-spacing:-.02em; line-height:1;}
.detail-head .dh-name i{font-style:normal; color:var(--ink-3); font-weight:400; font-size:.5em; margin-left:.35rem;}
.detail-head .dh-sub{font-size:.78rem; color:var(--ink-2); margin-top:.3rem;}
.detail-head .dh-fit{
  flex:0 0 auto; text-align:center; padding:.35rem .5rem; min-width:56px;
  color:var(--fit-ink);
}
.detail-head .dh-fit b{font-size:1.5rem; font-weight:700; display:block; line-height:1;}
.detail-head .dh-fit span{font-size:.66rem; color:var(--ink-3);}
.dclose{
  position:absolute; top:.5rem; right:.6rem;
  width:44px; height:44px; border:0; background:transparent; cursor:pointer;
  font-size:1.4rem; color:var(--ink-3); line-height:1;
}
.detail-scroll{flex:1 1 auto; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 1rem 2rem;}

.dsec{padding:.9rem 0 .3rem;}
.dsec h3{
  font-size:.76rem; font-weight:700; color:var(--ink); margin:0 0 .5rem;
  padding-bottom:.25rem; border-bottom:1px solid var(--rule-2);
}
/* why it ranks: each active dimension, your ask vs this place, and the sub-score bar */
.wrow{padding:.5rem 0; border-bottom:1px solid var(--rule);}
.wrow-top{display:flex; align-items:baseline; justify-content:space-between; gap:.6rem;}
.wrow-lab{font-size:.86rem; font-weight:600;}
.wrow-val{font-size:.86rem; font-weight:700; text-align:right; white-space:nowrap;}
.wrow-ask{font-size:.74rem; color:var(--ink-3); margin-top:.1rem;}
.wbar{height:8px; background:var(--sink); margin-top:.4rem; position:relative;}
.wbar i{position:absolute; left:0; top:0; bottom:0; display:block;}
.wrow.dim{opacity:.5;}
.wrow .wtag{font-size:.68rem; color:var(--ink-3); font-weight:600;}

.dgrid{display:grid; grid-template-columns:1fr 1fr; gap:.1rem .9rem;}
.drow{display:flex; justify-content:space-between; gap:.6rem; padding:.32rem 0; border-bottom:1px solid var(--rule); font-size:.82rem;}
.drow span{color:var(--ink-3);}
.drow b{font-weight:700;}
.prov-note{font-size:.76rem; color:var(--ink-3); margin:.7rem 0 0; line-height:1.5;}
.prov-note em{font-style:normal; color:var(--check); font-weight:700;}
.dwarn{
  font-size:.82rem; color:var(--ink-2); margin:.6rem 0 0;
  border-left:2px solid var(--warm); padding-left:.6rem;
}
.dwarn b{color:var(--ink);}

/* ================= TAB BAR ================= */
.tabbar{
  position:fixed; left:0; right:0; bottom:0; z-index:50;
  max-width:430px; margin:0 auto;
  height:calc(var(--tabbar) + var(--safe-b));
  padding-bottom:var(--safe-b);
  display:grid; grid-template-columns:repeat(3,1fr);
  background:var(--page); border-top:1px solid var(--ink);
}
.tab{
  font:inherit; background:transparent; border:0; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.15rem;
  color:var(--ink-3); font-size:.72rem; min-height:44px;
  border-top:2px solid transparent; margin-top:-1px;
}
.tab .ic{width:22px; height:22px; display:block;}
.tab .ic svg{width:22px; height:22px; display:block; fill:none; stroke:currentColor; stroke-width:1.6;}
.tab[aria-selected="true"]{color:var(--ink); border-top-color:var(--ink);}
.tab:focus-visible{outline:2px solid var(--warm); outline-offset:-2px;}

@media (prefers-reduced-motion:reduce){
  *{transition:none!important; animation:none!important;}
}
</style>
</head>
<body>
<div class="app" id="app">
  <header class="topbar">
    <h1>Where to live <i>in Canada</i></h1>
    <span class="meta tnum">30-place slice</span>
  </header>

  <!-- ============ ANSWER ============ -->
  <section class="screen on pad-bottom" id="screen-answer" role="tabpanel" aria-label="Answer">
    <button class="toppick" id="toppick" type="button" aria-label="Your top pick so far, tap to see the full ranking">
      <span>
        <span class="tp-k">Your top pick so far</span>
        <span class="tp-name" id="tp-name">—</span>
        <span class="tp-why" id="tp-why"></span>
      </span>
      <span>
        <span class="tp-fit tnum" id="tp-fit">–</span>
        <span class="tp-arrow">see list ›</span>
      </span>
    </button>
    <div class="survey-intro">
      <p>Set each one, then say how much it matters. The importance you set is the whole point — one thing you really care about can outrank everything else.</p>
    </div>
    <div id="qs"></div>
    <div class="survey-foot"><button class="reset" id="reset" type="button">Start over</button></div>
  </section>

  <!-- ============ MAP ============ -->
  <section class="screen pad-bottom" id="screen-map" role="tabpanel" aria-label="Map" hidden>
    <div class="maparea" id="maparea">
      <canvas id="map" role="img" aria-label="Map of Canada, places shaded by how well they fit your answers"></canvas>
      <div class="map-legend">
        <div class="row"><i style="background:var(--fit-4)"></i>Fits you</div>
        <div class="row"><i style="background:var(--fit-1)"></i>Does not</div>
        <div class="row"><i style="background:var(--rule-2);border-color:var(--rule-2)"></i>Ruled out</div>
      </div>
      <div class="sheet" id="mapsheet">
        <div class="sheet-grip" id="mapgrip">
          <div class="grip-bar"></div>
          <div class="sheet-head">
            <h2>Best matches</h2>
            <span class="n" id="mapcount"></span>
          </div>
        </div>
        <div class="sheet-scroll" id="mapsheet-scroll"></div>
      </div>
    </div>
  </section>

  <!-- ============ LIST ============ -->
  <section class="screen pad-bottom" id="screen-list" role="tabpanel" aria-label="List" hidden>
    <div class="list-head">
      <h2>Your ranking</h2>
      <p id="list-sub"></p>
    </div>
    <div id="cards"></div>
  </section>

  <!-- tab bar -->
  <nav class="tabbar" role="tablist" aria-label="Screens">
    <button class="tab" id="tab-answer" role="tab" aria-selected="true" data-screen="answer">
      <span class="ic"><svg viewBox="0 0 24 24"><path d="M5 4h14v16H5z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg></span>
      Answer
    </button>
    <button class="tab" id="tab-map" role="tab" aria-selected="false" data-screen="map">
      <span class="ic"><svg viewBox="0 0 24 24"><path d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><path d="M9 4v14M15 6v14"/></svg></span>
      Map
    </button>
    <button class="tab" id="tab-list" role="tab" aria-selected="false" data-screen="list">
      <span class="ic"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></span>
      List
    </button>
  </nav>
</div>

<!-- detail sheet -->
<div class="scrim" id="scrim"></div>
<div class="detail" id="detail" role="dialog" aria-modal="true" aria-label="Place detail">
  <div class="detail-grip" id="detailgrip"><div class="grip-bar"></div></div>
  <button class="dclose" id="dclose" aria-label="Close">×</button>
  <div class="detail-head" id="detail-head"></div>
  <div class="detail-scroll" id="detail-scroll"></div>
</div>

<script>

const state={}, weights={};

/* ---------- scoring: weighted power mean, weights 1/3/9, p=0.5 (faithful to desktop) ---------- */
const WEIGHT_SCALE=[0,1,3,9];
const P_MEAN=0.5;
const wOf=(id)=>WEIGHT_SCALE[weights[id]]||0;
function scoreAll(){
  const out=DATA.map(p=>{
    let num=0,den=0; const parts=[]; let excluded=null; const cells={};
    for(const q of Q){
      const s=q.score(p,state[q.id]); cells[q.id]=s;
      const w=wOf(q.id); if(!w) continue;
      if(q.hard&&q.hard(p,state[q.id])) excluded=q.hardWhy;
      if(s==null) continue;
      num+=w*Math.pow(s,P_MEAN); den+=w;
      parts.push({id:q.id,s,w,pull:w*(s-0.5)});
    }
    parts.sort((a,b)=>b.pull-a.pull);
    return {p, fit: den?Math.pow(num/den,1/P_MEAN)*100:0, parts, cells, excluded,
      good: parts.filter(x=>x.s>0.62).slice(0,2),
      bad: parts.length?parts[parts.length-1]:null};
  });
  out.sort((a,b)=>(a.excluded?1:0)-(b.excluded?1:0) || b.fit-a.fit);
  return out;
}
const keyOf=(r)=>r.p.name+'|'+r.p.prov;

const WL=['Skip','A little','Matters','A lot'];
function buildSurvey(){
  let lastG=null;
  $('#qs').innerHTML=Q.map(q=>{
    const head=q.g!==lastG?`<h3 class="qgroup">${q.g}</h3>`:''; lastG=q.g;
    const body=q.kind==='range'
      ? `<div class="answer"><div class="slider-row">
           <input type="range" id="r-${q.id}" min="${q.min}" max="${q.max}" step="${q.step}" value="${state[q.id]}" aria-label="${q.label}">
           <span class="readout tnum" id="o-${q.id}">${q.fmt(state[q.id])}</span></div>
           <div class="scale-ends"><span>${q.ends[0]}</span><span>${q.ends[1]}</span></div></div>`
      : `<div class="answer"><div class="opts">${q.opts.map(([v,l])=>`<button class="opt" type="button" data-q="${q.id}" data-v="${v}" aria-pressed="${state[q.id]===v}">${l}</button>`).join('')}</div></div>`;
    const seg=[0,1,2,3].map(n=>`<button class="seg-b${n===0?' skip':''}" type="button" data-w="${q.id}" data-n="${n}" aria-pressed="${weights[q.id]===n}">${WL[n]}</button>`).join('');
    return head+`<div class="q${weights[q.id]===0?' off':''}" id="q-${q.id}">
      <div class="q-head"><p class="q-label">${q.label}</p><span class="q-say" id="say-${q.id}">${said(q)}</span></div>
      <p class="q-hint">${q.hint}</p>
      ${body}
      <div class="imp"><span class="imp-lab">How much this matters</span>
        <div class="seg" role="group" aria-label="How much ${q.label} matters">${seg}</div></div>
    </div>`;
  }).join('');
}
function syncQuestion(id){
  const q=Q.find(x=>x.id===id);
  $('#say-'+id).textContent=said(q);
  const qc=$('#q-'+id); qc.classList.toggle('off',weights[id]===0);
  qc.querySelectorAll('.seg-b').forEach(b=>b.setAttribute('aria-pressed',+b.dataset.n===weights[id]));
  qc.querySelectorAll('.opt').forEach(b=>b.setAttribute('aria-pressed',b.dataset.v===state[id]));
}

});

/* ---------- MAP: canvas ---------- */
const cvs=$('#map'), ctx=cvs.getContext('2d');
let mapPts=[];
// stylized Canada silhouette in a 1000 x 620 space (recognizable, not survey-grade)
const LAND=[
 [150,140],[300,120],[470,120],[500,152],[520,300],[575,338],[625,300],[650,152],[700,132],
 [820,176],[872,262],[860,360],[884,430],[848,472],[800,456],[818,508],[892,506],[868,544],
 [836,552],[792,516],[758,486],[720,548],[672,562],[610,545],[598,476],[470,470],[250,462],
 [150,472],[124,382],[146,300],[120,220],[150,140]
];
const NFLD=[[905,392],[930,378],[934,408],[912,420],[898,404]];
const VANI=[[104,432],[122,412],[132,452],[112,470]];
function projLL(lng,lat){ // -> 1000x620 space
  const x=120+(lng+125)/62*760;
  const y=560-(lat-42)/12*230;
  return [x,y];
}
function drawMap(){
  const rect=cvs.getBoundingClientRect();
  const W=Math.round(rect.width)||360, H=Math.round(rect.height)||480;
  if(W<2||H<2) return;
  const dpr=window.devicePixelRatio||1;
  cvs.width=W*dpr; cvs.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,W,H);
  // fit the 1000x620 art into the canvas, top-biased so land sits above the sheet
  const k=Math.min(W/1000,H/700);
  const ox=(W-1000*k)/2, oy=8;
  const T=(x,y)=>[ox+x*k, oy+y*k];
  ctx.lineJoin='round';
  const fillPoly=(pts)=>{ ctx.beginPath(); pts.forEach(([x,y],i)=>{const[a,b]=T(x,y); i?ctx.lineTo(a,b):ctx.moveTo(a,b);}); ctx.closePath();
    ctx.fillStyle='#EFEFEA'; ctx.fill(); ctx.strokeStyle='#C7C9C2'; ctx.lineWidth=1; ctx.stroke(); };
  fillPoly(LAND); fillPoly(NFLD); fillPoly(VANI);
  // dots, low fit first so high-fit sit on top
  mapPts=[];
  const order=ranked.slice().reverse();
  for(const r of order){
    const [px,py]=projLL(r.p.lng,r.p.lat); const [x,y]=T(px,py);
    const rad=r.excluded?2.6:3.4+(r.fit/100)**2*7;
    ctx.beginPath(); ctx.arc(x,y,rad,0,6.2832);
    if(r.excluded){ ctx.fillStyle='#C7C9C2'; ctx.fill(); }
    else{ ctx.fillStyle=rampFit(r.fit); ctx.fill(); ctx.strokeStyle='#0A4F47'; ctx.lineWidth=0.9; ctx.stroke(); }
    mapPts.push({x,y,r:Math.max(rad,11),rec:r});
  }
  // label the top few
  const top=ranked.filter(r=>!r.excluded).slice(0,5);
  ctx.font=`600 12px -apple-system,system-ui,sans-serif`; ctx.textBaseline='middle';
  const placed=[];
  const hits=a=>placed.some(b=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y);
  for(const r of top){
    const [px,py]=projLL(r.p.lng,r.p.lat); const [x,y]=T(px,py);
    const t=r.p.name, w=ctx.measureText(t).width, h=13;
    let spot=null;
    for(const [tx,ty] of [[x+9,y],[x-9-w,y],[x-w/2,y-h],[x-w/2,y+h]]){
      if(tx<2||tx+w>W-2) continue;
      const box={x:tx-2,y:ty-h/2-1,w:w+4,h:h+2};
      if(!hits(box)){ spot=[tx,ty,box]; break; }
    }
    if(!spot) continue; placed.push(spot[2]);
    ctx.fillStyle='rgba(247,247,244,.85)'; ctx.fillRect(spot[2].x,spot[2].y,spot[2].w,spot[2].h);
    ctx.fillStyle='#17191D'; ctx.fillText(t,spot[0],spot[1]);
  }
}
function mapHit(mx,my){
  let best=null,bd=1e9;
  for(const q of mapPts){ const d=Math.hypot(q.x-mx,q.y-my); if(d<q.r&&d<bd){bd=d; best=q;} }
  return best;
}
cvs.addEventListener('click',e=>{
  const b=cvs.getBoundingClientRect();
  const hit=mapHit(e.clientX-b.left,e.clientY-b.top);
  if(hit) openDetail(keyOf(hit.rec));
});

  requestAnimationFrame(()=>{ d.style.transform='translateY(0)'; });

  selectedKey=null;
  $('#scrim').classList.remove('on');
  const d=$('#detail'); d.classList.add('animate'); d.style.transform='translateY(100%)';
}
function renderDetail(r){
  const p=r.p;
  $('#detail-head').innerHTML=`
    <div><div class="dh-name">${p.name}<i>${p.prov}</i></div>
      <div class="dh-sub">${r.excluded?`Ruled out on ${r.excluded}`:`Rank ${ranked.filter(x=>!x.excluded).indexOf(r)+1} of ${ranked.filter(x=>!x.excluded).length}`} · ${p.lived?'residents researched':'not researched'}</div></div>
    <div class="dh-fit" style="background:${r.excluded?'var(--sink)':rampFit(r.fit)}"><b>${r.excluded?'—':Math.round(r.fit)}</b><span>fit</span></div>`;

  const active=Q.filter(q=>wOf(q.id));
  const why=r.parts.length? r.parts.map(pt=>{
    const q=Q.find(x=>x.id===pt.id); const v=q.show(p);
    return `<div class="wrow">
      <div class="wrow-top"><span class="wrow-lab">${q.label} <span class="wtag">×${pt.w}</span></span>
        <span class="wrow-val tnum">${v[0]}${v[1]?'<i style="color:var(--ink-3);font-style:normal"> '+v[1]+'</i>':''}</span></div>
      <div class="wrow-ask">you asked: ${said(q).toLowerCase()}</div>
      <div class="wbar"><i style="width:${Math.round(pt.s*100)}%;background:${ramp01(pt.s)}"></i></div>
    </div>`;
  }).join('') : `<p class="prov-note">Every dimension is set to Skip. Turn some on to see why places rank.</p>`;

  // dimensions the place couldn't be scored on / set to skip
  const skipped=active.length<Q.length?`<p class="prov-note">${Q.length-active.length} of ${Q.length} dimensions are set to Skip and don't count.</p>`:'';

  const row=(k,v)=>`<div class="drow"><span>${k}</span><b class="tnum">${v}</b></div>`;
  const facts=`
    <div class="dgrid">
      ${row('January',p.jan.toFixed(1)+'°')}
      ${row('July',p.jul.toFixed(1)+'°')}
      ${row('Snow',Math.round(p.snow)+' cm')}
      ${row('Wildfire smoke',p.smoke.toFixed(2))}
      ${row('People',fmtNum(p.pop))}
      ${row('Home, avg',' $'+fmtNum(p.home))}
      ${row('Nearest big city',p.drive===0?'here':Math.round(p.drive)+' min')}
      ${row('Political lean',(p.lean>0?'+':'')+p.lean.toFixed(0))}
    </div>`;

  $('#detail-scroll').innerHTML=`
    ${r.excluded?`<p class="dwarn"><b>Ruled out.</b> This place fails a dealbreaker you set (${r.excluded}), so it is scored but parked below the ranking.</p>`:''}
    <div class="dsec"><h3>Why it ranks</h3>${why}${skipped}</div>
    <div class="dsec"><h3>Everything about ${p.name}</h3>${facts}
      <p class="prov-note">${p.lived?'<em>Researched.</em> Resident findings exist for this place.':'<em>Not researched.</em> Scored on measured data only.'} Climate 1981-2010 · Smoke 2013-2024 · Census 2021 · Votes 2025.</p>
    </div>`;
}
$('#dclose').addEventListener('click',closeDetail);
$('#scrim').addEventListener('click',closeDetail);
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&selectedKey) closeDetail(); });

/* ---------- draggable bottom sheets (touch + mouse via pointer events) ---------- */
function attachSheet(sheet, getSnaps, opts={}){
  const scroll=opts.scroll? sheet.querySelector(opts.scroll):null;
  let startY=0, startT=0, cur=0, dragging=false, moved=false, pid=null;
  const setT=(y)=>{ cur=y; sheet.style.transform=`translateY(${y}px)`; };
  function snapTo(y){
    const snaps=getSnaps();
    let best=snaps[0]; for(const s of snaps) if(Math.abs(s-y)<Math.abs(best-y)) best=s;
    sheet.classList.add('animate'); setT(best);
  }
  function fromGrip(e){ return !scroll || !scroll.contains(e.target); }
  function down(e){
    const snaps=getSnaps();
    const grip=fromGrip(e);
    // if dragging from the scroll body, only take over when at the top and pulling down
    if(!grip){
      const atTop=scroll.scrollTop<=0;
      const isFull=Math.abs(cur-Math.min(...snaps))<2;
      if(!(atTop||!isFull)) return;          // let it scroll
      if(isFull && !atTop) return;
    }
    dragging=true; moved=false; pid=e.pointerId; startY=e.clientY; startT=cur;
    sheet.classList.remove('animate');
    try{ sheet.setPointerCapture(pid); }catch(_){}
  }
  function move(e){
    if(!dragging) return;
    const snaps=getSnaps(), min=Math.min(...snaps), max=Math.max(...snaps);
    let y=startT+(e.clientY-startY);
    // if pulling down from inside the scroll, only allow when at top
    if(scroll && scroll.contains(e.target) && scroll.scrollTop>0 && y>startT){ }
    y=clamp(y,min-20,max+40);
    if(Math.abs(e.clientY-startY)>3) moved=true;
    if(moved){ e.preventDefault(); setT(y); }
  }
  function up(e){
    if(!dragging) return; dragging=false;
    try{ sheet.releasePointerCapture(pid); }catch(_){}
    if(moved){ snapTo(cur); }
  }
  sheet.addEventListener('pointerdown',down);
  sheet.addEventListener('pointermove',move,{passive:false});
  sheet.addEventListener('pointerup',up);
  sheet.addEventListener('pointercancel',up);
  return { set:setT, snapTo, snapIndex:(i)=>{ const s=getSnaps(); sheet.classList.add('animate'); setT(s[i]); } };
}

/* map results sheet: peek / half / full */
let mapSheetCtl;
function mapSnaps(){
  const area=$('#maparea').clientHeight||480;
  const peek=132, half=Math.round(area*0.5), full=Math.round(area*0.9);
  return [area-peek, area-half, area-full]; // [peek, half, full] as translateY
}
mapSheetCtl=attachSheet($('#mapsheet'), mapSnaps, {scroll:'#mapsheet-scroll'});

/* detail sheet drag-to-dismiss (snap: open at 0, or dismiss) */
(function(){
  const sheet=$('#detail'), scroll=$('#detail-scroll');
  let startY=0, cur=0, dragging=false, moved=false, pid=null, fromGrip=false;
  const H=()=>sheet.getBoundingClientRect().height;
  function down(e){
    fromGrip = $('#detailgrip').contains(e.target) || $('#detail-head').contains(e.target);
    if(!fromGrip){ if(scroll.scrollTop>0) return; }
    dragging=true; moved=false; pid=e.pointerId; startY=e.clientY; cur=0;
    sheet.classList.remove('animate');
    try{ sheet.setPointerCapture(pid);}catch(_){}
  }
  function move(e){
    if(!dragging) return;
    let dy=e.clientY-startY; if(dy<0) dy=0;
    if(Math.abs(e.clientY-startY)>3) moved=true;
    if(moved){ e.preventDefault(); cur=dy; sheet.style.transform=`translateY(${dy}px)`; }
  }
  function up(){
    if(!dragging) return; dragging=false;
    try{ sheet.releasePointerCapture(pid);}catch(_){}
    sheet.classList.add('animate');
    if(cur>H()*0.28){ closeDetail(); } else { sheet.style.transform='translateY(0)'; }
  }
  sheet.addEventListener('pointerdown',down);
  sheet.addEventListener('pointermove',move,{passive:false});
  sheet.addEventListener('pointerup',up);
  sheet.addEventListener('pointercancel',up);
})();

/* ---------- tabs ---------- */
const SCREENS=['answer','map','list'];
let currentScreen='answer';
function showScreen(name){
  currentScreen=name;
  SCREENS.forEach(s=>{
    const sec=$('#screen-'+s), tab=$('#tab-'+s);
    const on=s===name; sec.classList.toggle('on',on); sec.hidden=!on;
    tab.setAttribute('aria-selected',on?'true':'false');
  });
  if(name==='map'){
    // canvas has real size only once the screen is shown
    requestAnimationFrame(()=>{ drawMap(); mapSheetCtl.snapIndex(0); });
  }
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>showScreen(t.dataset.screen)));
$('#toppick').addEventListener('click',()=>showScreen('list'));

/* ---------- recompute + render ---------- */
function recompute(){
  ranked=scoreAll();
  renderTopPick();
  renderList();
  renderMapSheet();
  if(currentScreen==='map') drawMap();
  if(selectedKey){ const r=ranked.find(x=>keyOf(x)===selectedKey); if(r) renderDetail(r); }
}

let rt; addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(()=>{ if(currentScreen==='map'){ drawMap(); mapSheetCtl.snapTo(mapSnaps()[0]); } },140); });

/* ---------- init ---------- */
buildSurvey();
recompute();
</script>
